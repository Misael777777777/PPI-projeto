<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>

  <link rel="stylesheet" href="estilos/estilochat.css">
</head>
<body>

  <header>

    <div class="logo-container">
     <div style="display: flex; align-items: center;">
      <img src="fotos/logo.png" alt="Logo">

      
</div>
    </div>

  </header>

  <main>

    <section class="chat-box">

      <div class="top-chat">

        <h2>Chat Geral</h2>

        <p id="nomeUsuario"></p>

      </div>

      <div id="mensagens"></div>

      <div class="send-area">

        <input
          type="text"
          id="inputMensagem"
          placeholder="Digite sua mensagem..."
        >
        <br>
        <button id="btnEnviar">
          Enviar
        </button>

      </div>

    </section>

  </main>

  <footer>

   

    <p>IFRN Campus Santa Cruz</p>

    <p>Trabalho de Programação para Internet</p>

    <p>Prof. Marcelo Figueiredo Barbosa Júnior</p>

  </footer>

  <script src="script/chat.js"></script>

</body>
</html>
